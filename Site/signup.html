<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/símboloSysplus.png">
</head>
<body>
    <div class="topo">
        <div class="logo">
                <a href="home.html"><img src="img/logoSysplus.png" class="sysplus">
                </a>
            </div>
        <div>
            <a href="login.html" class="botao-login">LOGIN</a>
        </div>
    </div>
    <div class="center">
        <form class="box">
        <p class="etapa">Etapa 1: Dados Basícos</p>
        <h2>CRIAR CONTA</h2>
        <div>
            <label for="name">Nome Completo:</label>
            <input type="text" id="name" name="name" required>
        </div><br>
        <div>
        <div>
            <label for="user">Usuário:</label>
            <input type="text" id="user" name="user" required>
        </div><br>
        <div>
            <label for="cpf">CPF ou CNPJ:</label>
            <input type="number" id="cpf" name="cpf" required>
        </div><br>
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div><br>
        <div>
            <label for="telefone">Telefone(DDD):</label>
            <input type="tel" id="telefone" name="telefone" placeholder="(__)_ ____-____" required>
        </div><br>
        <div class="linha">
            <div>
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="email" required>
            </div><br>
            <div>
                <label for="confirmar">Confirmar senha:</label>
                <input type="password" id="confirmar" name="email" required>
            </div><br>
        </div>
        <button type="submit">Enviar</button>
        <p class="cadastro">
            Já tem Conta? <a href="login.html" class="botao-signup">Fazer Login</a>
        </p>
    </form>
    </div>
</body>
</html>
