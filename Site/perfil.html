<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/símboloSysplus.png">
</head>
<body>
    <header>
        <div class="topo">
            <div class="logo">
                <a href="index.html"><img src="img/logoSysplus.png" alt="Logo Sysplus" class="sysplus">
                </a>
            </div>
            <div id="area-usuario" class="header-user">
            </div>
        </div>
    </header>

    <main>
        <section>
            <div class="center-perfil">
                <div class="btn-perfil">
                    <button class="btn-conf-perfil">MEU PERFIL</button>
                    <button class="btn-conf-perfil">EDITAR INFORMAÇÕES</button>
                    <button class="btn-conf-perfil">SEGURANÇA</button>
                </div>
                <div class="box-info">
                    <div class="info">
                        <img src="img/user.png" alt="Usuário">
                        <p>Usuário</p>
                        <p>Conta criada</p>
                        <div class="sua-conta"><p>Conta ativada</p></div>
                        <h4>Dados Pessoais</h4>
                        <button>ALTERAR</button>
                    </div>
                    <div class="inf-pessoais">
                        
                    </div>                        
                </div>
            </div>
        </section>
    </main>

    <script>
        const nome = localStorage.getItem('usuario_nome');
        const logado = localStorage.getItem('usuario_logado');
        const area   = document.getElementById('area-usuario');

        if (logado === 'true' && nome) {
            // Usuário logado: mostra o nome
            const primeiroNome = nome.split(' ')[0]; // pega só o primeiro nome

            area.innerHTML = `
                <img src="img/user.png" alt="Usuário">
                <p class="usuario">${primeiroNome}</p>
            `;
        }
    </script>
</body>
</html>
