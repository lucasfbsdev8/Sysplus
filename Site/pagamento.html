<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forma de Pagamento</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/símboloSysplus.png">
</head>
<body>
    <header>
        <div class="topo-busca">
            <div class="logo">
                <a href="index.html">
                    <img src="img/logoSysplus.png" class="sysplus">
                </a>
            </div>
            <div class="busca">
                <input type="text" placeholder="Buscar produtos, marcas e muito mais...">
            </div>
            <div id="area-usuario" class="botao-login"></div>
        </div>
    </header>
        
    <nav>
        <div class="sub-topo carrinho-end">
            <div class="compras">
                <a href="carrinho.html">
                    <img src="img/suascompras.png">
                    Suas compras
                </a>
            </div>
        </div>
    </nav>

    <section class="categorias-carrinho">
        <div class="categoria-circulo">
            <div class="bolinha ativa"></div>
            <span>Carrinho</span>
        </div>
        <div class="linha-categoria"></div>
        <div class="categoria-circulo">
            <div class="bolinha ativa"></div>
            <span>Entrega</span>
        </div>
        <div class="linha-categoria"></div>
        <div class="categoria-circulo">
            <div class="bolinha ativa"></div>
            <span>Pagamento</span>
        </div>
    </section>

    <section class="center-perfil">
        <div class="box-info" id="bloco-formulario">
            <h4>Forma de Pagamento</h4>

            <div class="campo-info">
                <label>
                    <input type="radio" name="pagamento" value="cartao" checked>
                    Cartão de Crédito
                </label>
            </div>

            <div class="campo-info">
                <label>Número do Cartão</label>
                <input type="text" id="numero-cartao">
            </div>

            <div class="linha">
                <div class="campo-info">
                    <label>Validade</label>
                    <input type="text" id="validade-cartao" placeholder="MM/AA">
                </div>
                <div class="campo-info">
                    <label>CVV</label>
                    <input type="text" id="cvv-cartao">
                </div>
            </div>

            <div class="campo-info">
                <label>Nome Impresso no Cartão</label>
                <input type="text" id="nome-cartao">
            </div>

            <div class="campo-info">
                <label>
                    <input type="radio" name="pagamento" value="pix">
                    PIX
                </label>
            </div>

            <div class="campo-info">
                <label>
                    <input type="radio" name="pagamento" value="boleto">
                    Boleto Bancário
                </label>
            </div>

            <div class="end">
                <button class="btn-editar" onclick="confirmarPedido()">
                    CONFIRMAR PEDIDO
                </button>
            </div>
        </div>

        <div class="box-info" id="bloco-resultado" style="display: none; text-align: center;">
            <h4 id="titulo-resultado" style="margin-bottom: 20px;">Pedido Recebido!</h4>
            <div id="conteudo-resultado"></div>
            <div class="end" style="margin-top: 20px; display: flex; flex-direction: column; gap: 10px; align-items: center;">
                <button class="btn-editar" onclick="window.location.href='index.html'">Voltar para a Home</button>
            </div>
        </div>
    </section>

    <script>
        const logado = localStorage.getItem('usuario_logado');
        const nome   = localStorage.getItem('usuario_nome');
        const area   = document.getElementById('area-usuario');

        if (logado === 'true' && nome) {
            const primeiroNome = nome.split(' ')[0];
            area.innerHTML = `
                <a href="perfil.html">
                    <span class="saudacao">Olá, ${primeiroNome}!</span>
                    <img src="img/user.png" alt="perfil">
                </a>
            `;
        } else {
            area.innerHTML = `
                <a href="login.html">
                    <img src="img/user.png" class="icone-perfil" alt="perfil">
                    VISITANTE
                </a>
            `;
        }
    </script>

    <script>
        function confirmarPedido() {
            const elementoPagamento = document.querySelector('input[name="pagamento"]:checked');
            if (!elementoPagamento) return;

            const formaPagamento = elementoPagamento.value;

            if (formaPagamento === 'cartao') {
                const numero = document.getElementById('numero-cartao').value.trim();
                const validade = document.getElementById('validade-cartao').value.trim();
                const cvv = document.getElementById('cvv-cartao').value.trim();
                const nomeCartao = document.getElementById('nome-cartao').value.trim();

                if (!numero || !validade || !cvv || !nomeCartao) {
                    alert('Por favor, preencha todos os dados do cartão.');
                    return; 
                }
                
                localStorage.removeItem('carrinho');
                sessionStorage.removeItem('endereco');
                alert('Pedido confirmado! Pagamento aprovado via Cartão.');
                window.location.href = 'index.html';
                return;
            }

            const blocoForm = document.getElementById('bloco-formulario');
            const blocoResult = document.getElementById('bloco-resultado');
            const tituloResult = document.getElementById('titulo-resultado');
            const conteudoResult = document.getElementById('conteudo-resultado');

            blocoForm.style.display = 'none';
            blocoResult.style.display = 'block';

            if (formaPagamento === 'pix') {
                tituloResult.textContent = 'Pagamento via PIX';
                conteudoResult.innerHTML = `
                    <p style="margin-bottom: 15px;">Copie o código abaixo para pagar no aplicativo do seu banco:</p>
                    <span style="background: rgba(0,0,0,0.05); padding: 15px; display: block; margin: 20px 0; word-break: break-all; font-family: monospace; border: 1px dashed rgba(0,0,0,0.2); font-size: 14px;">00020101021226850014br.gov.bcb.pix2563syspluspagamentos2026061099887766554433221105303986</span>
                    <div class="end"><button class="btn-editar" onclick="navigator.clipboard.writeText('00020101021226850014br.gov.bcb.pix2563syspluspagamentos2026061099887766554433221105303986'); alert('Código Copiado!');">Copiar Código PIX</button></div>
                `;
            } else if (formaPagamento === 'boleto') {
                tituloResult.textContent = 'Pagamento via Boleto';
                conteudoResult.innerHTML = `
                    <p style="margin-bottom: 15px;">Seu boleto bancário foi gerado com sucesso.</p>
                    <p style="font-weight:bold; margin: 20px 0; font-family: monospace; font-size: 14px;">Linha digitável:<br>34191.79001 01043.513184 91020.150008 7 98230000015000</p>
                    <div class="end"><button class="btn-editar" onclick="alert('Boleto enviado para o seu e-mail cadastrado.');">Imprimir Boleto</button></div>
                `;
            }

            localStorage.removeItem('carrinho');
            sessionStorage.removeItem('endereco');
        }
    </script>
</body>
</html>
