<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSPLUS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/símboloSysplus.png">
</head>
<body>
    <header>
        <div class="topo-busca">
            <div class="logo">
                <a href="index.html"><img src="img/logoSysplus.png" class="sysplus">
                </a>
            </div>
            <div class="busca">
                <input type="text" placeholder="Buscar produtos, marcas e muito mais...">
            </div>
            <div id="area-usuario" class="botao-login">
            </div>
        </div>
    </header>

    <nav>
        <div class="sub-topo">
            <div class="area">
                <div class="sidebar">☰ Todos</div>
                <div class="menu">
                    <a href="#">Todos os Produtos</a>
                    <a href="#">Roupas</a>
                    <a href="#">Eletrônicos</a>
                    <a href="#">Móveis</a>
                    <a href="#">Brinquedos</a>
                    <a href="#">Eletrodomésticos</a>
                </div>
            </div>
            <div class="navigation">
                <a href="#">Ofertas do Dia</a>
                <a href="#">Moda</a>
                <a href="#">Eletrônicos</a>
                <a href="#">Esportes</a>
                <a href="#">Móveis</a>
                <a href="#">Vender</a>
            </div>
            <div class="compras">
                <a href="carrinho.html">
                    <img src="img/suascompras.png">
                    Suas compras
                    <span id="badge-carrinho" class="badge-carrinho" style="display:none"></span>
                </a>
            </div>
        </div>
    </nav>    
        
    <main>
        <section>
            <div class="categoria">
                <div class="categoria-item">
                    <a href="#" class="btn-categoria"><img src="img/categoria-moda.png" alt="Categoria Moda"></a>
                    <p>Moda</p>
                </div>
                <div class="categoria-item">
                    <a href="#" class="btn-categoria"><img src="img/categoria-eletronicos.png" alt="Categoria Eletrônicos"></a>
                <p>Eletrônicos</p>
                </div>
                <div class="categoria-item">
                    <a href="#" class="btn-categoria"><img src="img/categoria-esportes.png" alt="Categoria Esportes"></a>
                    <p>Esportes</p>
                </div>
                <div class="categoria-item">
                    <a href="#" class="btn-categoria"><img src="img/categoria-moveis.png" alt="Categoria Móveis"></a>
                    <p>Móveis</p>
                </div>
            </div>
        </section>

        <section class="secao-produtos">
            <h2 class="ofertas">OFERTAS DO DIA</h2>
            <div class="grade-produtos" id="ofertas-produtos">
                <!-- os cards serão inseridos pelo JavaScript -->
            </div>
            <h2 class="ofertas">PRODUTOS</h2>
            <div class="grade-produtos" id="todos-produtos">
                <!-- os cards serão inseridos pelo JavaScript -->
            </div>
        </section>
        <div class="toast" id="toast"></div>
    </main>
        

    <script>
        const logado = localStorage.getItem('usuario_logado');
        const nome   = localStorage.getItem('usuario_nome');
        const area   = document.getElementById('area-usuario');

        if (logado === 'true' && nome) {
            // Usuário logado: mostra o nome
            const primeiroNome = nome.split(' ')[0]; // pega só o primeiro nome

            area.innerHTML = `
                <a href="perfil.html">
                    <span class="saudacao">Olá, ${primeiroNome}!</span>
                    <img src="img/user.png"  alt="perfil">
                </a>
            `;
        } else {
            // Visitante: mostra botão de login
            area.innerHTML = `
                <a href="login.html">
                    <img src="img/user.png" class="icone-perfil" alt="perfil">
                    VISITANTE
                </a>
            `;
        }
    </script>
    <script src="js/produtos.js"></script>
    <script src="js/carrinho.js"></script>
    <script>
  function criarCard(p) {
    return `
      <div class="card-produto" onclick="window.location='produtos.html?id=${p.id}'">
        <img src="${p.imagem}" alt="${p.nome}" class="img-card">
        <div class="info-card">
          <h3>${p.nome}</h3>
          <p class="preco-card">R$ ${p.preco.toLocaleString('pt-BR')}</p>
          <p class="frete-card">${p.frete}</p>
          <button class="btn-adicionar"
            onclick="event.stopPropagation(); adicionarCarrinho(${p.id})">
            Adicionar ao carrinho
          </button>
        </div>
      </div>`;
  }

  function renderizar(lista) {
    const ofertas = lista.filter(p => p.oferta);
    const outros  = lista.filter(p => !p.oferta);
    document.getElementById('ofertas-produtos').innerHTML = ofertas.map(criarCard).join('');
    document.getElementById('todos-produtos').innerHTML   = outros.map(criarCard).join('');
  }

  renderizar(PRODUTOS);
</script>
</body>
</html>
