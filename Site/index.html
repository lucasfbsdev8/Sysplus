<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSPLUS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/símboloSysplus.png">
</head>
<body>
    <header>
        <div class="topo-busca">
            <div class="logo">
                <a href="index.html"><img src="img/logoSysplus.png" class="sysplus">
                </a>
            </div>
            <div class="busca">
                <input type="text" id="input-busca" placeholder="Buscar produtos, marcas e muito mais..." autocomplete="off">
            </div>
            <div id="area-usuario" class="botao-login">
            </div>
        </div>
    </header>

    <nav>
        <div class="sub-topo">
            <div class="area">
                <div class="sidebar">☰ Todos</div>
                <div class="menu">
                    <a href="index.html" onclick="filtrarCategoria(null, this); return false;">Todos os Produtos</a>
                    <a href="index.html" onclick="filtrarCategoria('Moda', this); return false;">Moda</a>
                    <a href="index.html" onclick="filtrarCategoria('Eletronicos', this); return false;">Eletrônicos</a>
                    <a href="index.html" onclick="filtrarCategoria('Moveis', this); return false;">Móveis</a>
                    <a href="index.html" onclick="filtrarCategoria('Esportes', this); return false;">Esportes</a>
                </div>
            </div>
            <div class="navigation">
                <a href="index.html" onclick="filtrarCategoria(null, this); return false;">Ofertas do Dia</a>
                <a href="index.html" onclick="filtrarCategoria('Moda', this); return false;">Moda</a>
                <a href="index.html" onclick="filtrarCategoria('Eletronicos', this); return false;">Eletrônicos</a>
                <a href="index.html" onclick="filtrarCategoria('Esportes', this); return false;">Esportes</a>
                <a href="index.html" onclick="filtrarCategoria('Moveis', this); return false;">Móveis</a>
                <a href="index.html" onclick="return false;">Vender</a>
            </div>
            <div class="compras">
                <a href="carrinho.html">
                    <img src="img/suascompras.png">
                    Suas compras
                    <span id="badge-carrinho" class="badge-carrinho" style="display:none"></span>
                </a>
            </div>
        </div>
    </nav>    
        
    <main>
        <section>
            <div class="categoria">
                <div class="categoria-item">
                    <a href="index.html" class="btn-categoria" onclick="filtrarCategoria('Moda'); return false;"><img src="img/categoria-moda.png" alt="Categoria Moda"></a>
                    <p>Moda</p>
                </div>
                <div class="categoria-item">
                    <a href="index.html" class="btn-categoria" onclick="filtrarCategoria('Eletronicos'); return false;"><img src="img/categoria-eletronicos.png" alt="Categoria Eletrônicos"></a>
                <p>Eletrônicos</p>
                </div>
                <div class="categoria-item">
                    <a href="index.html" class="btn-categoria" onclick="filtrarCategoria('Esportes'); return false;"><img src="img/categoria-esportes.png" alt="Categoria Esportes"></a>
                    <p>Esportes</p>
                </div>
                <div class="categoria-item">
                    <a href="index.html" class="btn-categoria" onclick="filtrarCategoria('Moveis'); return false;"><img src="img/categoria-moveis.png" alt="Categoria Móveis"></a>
                    <p>Móveis</p>
                </div>
            </div>
        </section>

        <section class="secao-produtos">
            <h2 class="ofertas" id="texto-ofertas">OFERTAS DO DIA</h2>
            <div class="grade-produtos" id="ofertas-produtos">
                <!-- os cards serão inseridos pelo JavaScript -->
            </div>
            <h2 class="ofertas" id="texto-produtos">PRODUTOS</h2>
            <div class="grade-produtos" id="todos-produtos">
                <!-- os cards serão inseridos pelo JavaScript -->
            </div>
        </section>
        <div class="toast" id="toast"></div>
    </main>
        
    <button id="btn-topo" onclick="window.scrollTo({ top: 0, behavior: 'smooth' })">&#8679;</button>

    <script>
        window.addEventListener('scroll', function () {
            const btn = document.getElementById('btn-topo');
            btn.style.display = window.scrollY > 300 ? 'flex' : 'none';
        });
    </script>
    <script>
        const logado = localStorage.getItem('usuario_logado');
        const nome   = localStorage.getItem('usuario_nome');
        const area   = document.getElementById('area-usuario');

        if (logado === 'true' && nome) {
            const primeiroNome = nome.split(' ')[0];

            area.innerHTML = `
                <a href="perfil.html">
                    <span class="saudacao">Olá, ${primeiroNome}!</span>
                    <img src="img/user.png"  alt="perfil">
                </a>
            `;
        } else {
            area.innerHTML = `
                <a href="login.html">
                    <img src="img/user.png" class="icone-perfil" alt="perfil">
                    VISITANTE
                </a>
            `;
        }
    </script>
    <script src="js/produtos.js"></script>
    <script src="js/carrinho.js"></script>
    <script>
        function criarCard(p) {
            return `
            <div class="card-produto" onclick="window.location='produtos.html?id=${p.id}'">
                <img src="${p.imagem}" alt="${p.nome}" class="img-card">
                <div class="info-card">
                <h3>${p.nome}</h3>
                <p class="preco-card">R$ ${p.preco.toLocaleString('pt-BR')}</p>
                <p class="frete-card">${p.frete}</p>
                <button class="btn-adicionar"
                    onclick="event.stopPropagation(); adicionarCarrinho(${p.id})">
                    Adicionar ao carrinho
                </button>
                </div>
            </div>`;
        }

        function renderizarHome(lista) {
            const ofertas = lista.filter(p => p.oferta);
            const outros  = lista.filter(p => !p.oferta);
            document.getElementById('texto-ofertas').style.display = ofertas.length ? '' : 'none';
            document.getElementById('texto-produtos').style.display = outros.length  ? '' : 'none';
            document.getElementById('ofertas-produtos').innerHTML = ofertas.map(criarCard).join('');
            document.getElementById('todos-produtos').innerHTML   = outros.map(criarCard).join('');
        }

        function filtrarCategoria(categoria, elLink){
            document.getElementById('input-busca').value = '';

            if (!categoria) {
                document.getElementById('texto-ofertas').textContent = 'OFERTAS DO DIA';
                document.getElementById('texto-produtos').textContent = 'PRODUTOS';
                renderizarHome(PRODUTOS);
                return;
            }

            const norm = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
            const lista = PRODUTOS.filter(p => {
                const cats = Array.isArray(p.categoria) ? p.categoria : [p.categoria];
                return cats.some(c => norm(c) === norm(categoria));
            });

            const nomesCategoria = {
                'Moda':       'MODA',
                'Eletronicos':'ELETRÔNICOS',
                'Moveis':     'MÓVEIS',
                'Esportes':   'ESPORTES',
            };

            const label = nomesCategoria[categoria] || categoria.toUpperCase();
 
            document.getElementById('texto-ofertas').textContent = label + ' — OFERTAS';
            document.getElementById('texto-produtos').textContent = label + ' — TODOS OS PRODUTOS';
            document.getElementById('texto-ofertas').style.display = '';
            document.getElementById('texto-produtos').style.display = '';
 
            const ofertas = lista.filter(p => p.oferta);
            const outros  = lista.filter(p => !p.oferta);
 
            document.getElementById('texto-ofertas').style.display = ofertas.length ? '' : 'none';
            document.getElementById('texto-produtos').style.display = outros.length  ? '' : 'none';
 
            document.getElementById('ofertas-produtos').innerHTML = ofertas.map(criarCard).join('');
            document.getElementById('todos-produtos').innerHTML   = outros.map(criarCard).join('');
 
            if (!lista.length) {
                document.getElementById('todos-produtos').innerHTML =
                    '<p style="padding:30px;color:#888">Nenhum produto encontrado nesta categoria.</p>';
                document.getElementById('texto-produtos').style.display = '';
            }
        }

        document.getElementById('input-busca').addEventListener('input', function () {
            const termo = this.value.trim().toLowerCase();
 
            if (!termo) {
                document.getElementById('texto-ofertas').textContent = 'OFERTAS DO DIA';
                document.getElementById('texto-produtos').textContent = 'PRODUTOS';
                renderizarHome(PRODUTOS);
                return;
            }
 
            const resultado = PRODUTOS.filter(p =>
                p.nome.toLowerCase().includes(termo)
            );

            document.getElementById('texto-ofertas').style.display = 'none';
            document.getElementById('ofertas-produtos').innerHTML   = '';
 
            document.getElementById('texto-produtos').style.display = '';
            document.getElementById('texto-produtos').textContent   =
                `RESULTADOS PARA "${this.value.trim().toUpperCase()}" (${resultado.length})`;
 
            if (resultado.length) {
                document.getElementById('todos-produtos').innerHTML = resultado.map(criarCard).join('');
            } else {
                document.getElementById('todos-produtos').innerHTML =
                    '<p style="padding:30px;color:#888">Nenhum produto encontrado para essa busca.</p>';
            }
        });

        renderizarHome(PRODUTOS);
    </script>
</body>
</html>
