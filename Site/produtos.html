<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produto - Sysplus</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/símboloSysplus.png">
</head>
<body>
    <header>
        <div class="topo-busca">
            <div class="logo">
                <a href="index.html"><img src="img/logoSysplus.png" class="sysplus">
                </a>
            </div>            
            <div class="busca">
                <input type="text" placeholder="Buscar produtos, marcas e muito mais...">
            </div>
            <div id="area-usuario" class="botao-login">
            </div>
        </div>
    </header>
        
    <nav>
        <div class="sub-topo">
            <div class="area">
                <div class="sidebar">☰ Todos</div>
                <div class="menu">
                    <a href="index.html" onclick="filtrarCategoria(null, this); return false;">Todos os Produtos</a>
                    <a href="index.html" onclick="filtrarCategoria('Moda', this); return false;">Moda</a>
                    <a href="index.html" onclick="filtrarCategoria('Eletronicos', this); return false;">Eletrônicos</a>
                    <a href="index.html" onclick="filtrarCategoria('Moveis', this); return false;">Móveis</a>
                    <a href="index.html" onclick="filtrarCategoria('Esportes', this); return false;">Esportes</a>
                </div>
            </div>
            <div class="navigation">
                <a href="index.html" onclick="filtrarCategoria(null, this); return false;">Ofertas do Dia</a>
                <a href="index.html" onclick="filtrarCategoria('Moda', this); return false;">Moda</a>
                <a href="index.html" onclick="filtrarCategoria('Eletronicos', this); return false;">Eletrônicos</a>
                <a href="index.html" onclick="filtrarCategoria('Esportes', this); return false;">Esportes</a>
                <a href="index.html" onclick="filtrarCategoria('Moveis', this); return false;">Móveis</a>
                <a href="index.html" onclick="return false;">Vender</a>
            </div>
            <div class="compras">
                <a href="carrinho.html">
                    <img src="img/suascompras.png">
                    Suas compras
                    <span id="badge-carrinho" class="badge-carrinho" style="display:none"></span>
                </a>
            </div>
        </div>
    </nav>
    <main>
        <button onclick="history.back()" class="btn-voltar">
            &#8592; Voltar
        </button>
       <div id="conteudo-produto"></div>
       <div class="toast" id="toast"></div>
    </main>
    

    <script>
        const logado = localStorage.getItem('usuario_logado');
        const nome   = localStorage.getItem('usuario_nome');
        const area   = document.getElementById('area-usuario');

        if (logado === 'true' && nome) {
            // Usuário logado: mostra o nome
            const primeiroNome = nome.split(' ')[0]; // pega só o primeiro nome

            area.innerHTML = `
                <a href="perfil.html">
                    <span class="saudacao">Olá, ${primeiroNome}!</span>
                    <img src="img/user.png"  alt="perfil">
                </a>
            `;
        } else {
            // Visitante: mostra botão de login
            area.innerHTML = `
                <a href="login.html">
                    <img src="img/user.png" class="icone-perfil" alt="perfil">
                    VISITANTE
                </a>
            `;
        }
    </script>
    <script src="js/produtos.js"></script>
    <script src="js/carrinho.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const id = parseInt(params.get('id'));
        const produto = PRODUTOS.find(p => p.id === id);
        const main = document.getElementById('conteudo-produto');
        
        if (!produto) {
            main.innerHTML = '<p style="text-align:center;padding:60px">Produto não encontrado.</p>';
        } else {
            document.title = produto.nome + ' - Sysplus';
            main.innerHTML = `
            <section style="display:flex;gap:40px;padding:30px 40px;max-width:1100px;margin:0 auto">
                <img src="${produto.imagem}" style="width:380px;object-fit:contain;background:white;border-radius:12px;padding:30px">
            
                <div style="flex:1">
                <h1>${produto.nome}</h1>
                <p style="font-size:13px;color:#888;text-decoration:line-through">
                    R$ ${produto.precoOriginal.toLocaleString('pt-BR')}
                </p>
                <p style="font-size:32px;font-weight:bold;color:var(--textcolor)">
                    R$ ${produto.preco.toLocaleString('pt-BR')}
                </p>
                <p style="color:#3B6D11">${produto.entrega} • ${produto.frete}</p>
                <p>${produto.descricao}</p>
                <div style="display:flex; align-items:center; gap:8px; margin:8px 0">
                    ${gerarEstrelas(produto.avaliacao)}
                    <span style="color:#888; font-size:13px">${produto.avaliacao} · ${produto.avaliacoes} avaliações</span>
                </div>
            
                <div style="display:flex;gap:12px;margin-top:20px">
                    <button class="botao-acesso" onclick="adicionarCarrinho(${produto.id}); window.location.href='carrinho.html'">
                    Comprar agora
                    </button>
                    <button class="botao-acesso" style="background:transparent;border:2px solid var(--textcolor);color:var(--textcolor)"
                    onclick="adicionarCarrinho(${produto.id})">
                    Adicionar ao carrinho
                    </button>
                </div>
                </div>
            </section>`;
        }

        
    </script>
</body>
</html>
