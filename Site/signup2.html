<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/símboloSysplus.png">
</head>
<body>
    <header>
        <div class="topo">
        <div class="logo">
            <a href="index.html"><img src="img/logoSysplus.png" class="sysplus">
            </a>
        </div>
        <div>
            <a href="login.html" class="botao-login">LOGIN</a>
        </div>
    </div>
    </header>

    <main>
        <section>
            <div class="center">
                <form class="box" id="formEtapa2" onsubmit="validarEtapa2(event)">
                    <p class="etapa">Etapa 2: Configuração de Perfil</p>
                    <h2>QUASE LÁ!<br>CONFIGURE SEU PERFIL</h2>
                    <p class="cadastro">Nos diga onde você está e o que procura para personalizar sua experiência</p>
                    <div>
                        <label for="cep">CEP (Código Postal):</label>
                        <input type="tel" id="cep" name="cep" placeholder="_____-___" maxlength="9" required>
                    </div><br>
                    <div>
                            <div class="options-profile">
                                <div class="item">
                                    <img src="img/moda.png" class="preferencias">
                                        <label>
                                            <input type="checkbox" name="moda" value="MODA">MODA
                                        </label>
                                </div>
                                <div class="item">
                                    <img src="img/eletronicos.png" class="preferencias">
                                        <label>
                                            <input type="checkbox" name="eletronicos" value="ELETRONICOS">ELETRÔNICOS
                                        </label>
                                </div>
                                <div class="item">
                                    <img src="img/esportes.png" class="preferencias-novo">
                                        <label>
                                            <input type="checkbox" name="esportes" value="ESPORTES">ESPORTES
                                        </label>
                                </div>
                                <div class="item">
                                    <img src="img/moveis.png" class="preferencias">
                                        <label>
                                            <input type="checkbox" name="moveis" value="MÓVEIS">MÓVEIS
                                        </label>
                                </div>
                            </div>
                    </div>
                    <br>
                    <button type="submit" class="botao-acesso">CONFIRMAR PREFERÊNCIAS</button>
                </form>
            </div>
        </section>
    </main>
            
    <script>
    window.onload = function() {
        const nome = sessionStorage.getItem('cadastro_nome');

        if (!nome) {
            alert('Por favor, complete a etapa 1 primeiro.');
            window.location.href = 'signup.html'; 
            }
    }

    function validarEtapa2(event) {
        event.preventDefault();

        // 1. Verifica se o CEP foi preenchido
        const cep = document.getElementById('cep').value.trim();
        if (!cep || cep.length < 9) {
            alert('Por favor, insira um CEP válido.');
            return;
        }

        // 2. Verifica se ao menos uma preferência foi selecionada
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        const algumMarcado = Array.from(checkboxes).some(cb => cb.checked);

        if (!algumMarcado) {
            alert('Selecione ao menos uma preferência.');
            return;
        }

        // 3. Salva as preferências
        const preferencias = Array.from(checkboxes)
            .filter(cb => cb.checked)
            .map(cb => cb.value);

        sessionStorage.setItem('cadastro_cep', cep);
        sessionStorage.setItem('cadastro_preferencias', JSON.stringify(preferencias));

        // 4. Aqui você pode enviar tudo para um backend ou redirecionar
        // Monta o objeto do novo usuário
        const novoUsuario = {
            nome:        sessionStorage.getItem('cadastro_nome'),
            usuario:     sessionStorage.getItem('cadastro_usuario'),
            cpf:         sessionStorage.getItem('cadastro_cpf'),
            email:       sessionStorage.getItem('cadastro_email'),
            telefone:    sessionStorage.getItem('cadastro_telefone'),
            senha:       sessionStorage.getItem('cadastro_senha'),
            cep:         cep,
            preferencias: preferencias
        };

        // Adiciona ao array de usuários
        const usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];
        usuarios.push(novoUsuario);
        localStorage.setItem('usuarios', JSON.stringify(usuarios));

        // Salva sessão
        localStorage.setItem('usuario_logado', 'true');
        localStorage.setItem('usuario_nome', novoUsuario.nome);
        localStorage.setItem('usuario_email', novoUsuario.email);

        alert('Cadastro concluído com sucesso!');
        sessionStorage.clear();
        window.location.href = 'index.html';
    }
    </script>
</body>
</html>
