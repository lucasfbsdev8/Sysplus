<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/símboloSysplus.png">
</head>
<body>
    <div class="topo">
            <div class="logo">
                <a href="home.html"><img src="img/logoSysplus.png" class="sysplus">
                </a>
            </div>
        </div>
    <div class="center">
        <div>
            <form class="box-login">
                <h2>LOGIN</h2>
                <p class="cadastro">FAÇA SEU LOGIN</p>
                <div>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <br><div>
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" name="senha">
                </div><br>
                <button type="submit">ACESSAR CONTA</button>
                <p class="cadastro">
                    Não tem conta? <a href="signup.html" class="botao-signup">Cadastre-se</a>
                </p>
            </form>
        </div>
    </div>
    
</body>
</html>
