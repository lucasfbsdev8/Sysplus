<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/símboloSysplus.png">
</head>
<body>
    <div class="topo">
            <div class="logo">
                <a href="home.html"><img src="img/logoSysplus.png" class="sysplus">
                </a>
            </div>
        </div>
    <div class="center">
        <div>
            <form class="box-login">
                <h2>LOGIN</h2>
                <p class="cadastro">FAÇA SEU LOGIN</p>
                <div>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                    <div class="msg-erro" id="erro-email">Insira um e-mail válido.</div>
                </div>
                <br><div>
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" name="senha">
                    <div class="msg-erro" id="erro-senha">A senha deve ter pelo menos 6 caracteres.</div>
                </div><br>
                <button type="button " id="btn-login">ACESSAR CONTA</button>
                <p class="cadastro">
                    Não tem conta? <a href="signup.html" class="botao-signup">Cadastre-se</a>
                </p>
            </form>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
        const emailInput = document.getElementById('email');
        const senhaInput = document.getElementById('senha');
        const erroEmail  = document.getElementById('erro-email');
        const erroSenha  = document.getElementById('erro-senha');
        const btnLogin   = document.getElementById('btn-login');
        const toast      = document.getElementById('toast');
    
        function mostrarToast(msg, tipo = '') {
            toast.textContent = msg;
            toast.className = 'toast visivel ' + tipo;
            setTimeout(() => { toast.className = 'toast'; }, 3000);
        }
    
        function validarEmail(v) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim());
        }
    
        function definirCampo(input, msgEl, valido, msg) {
            input.classList.toggle('campo-erro', !valido);
            input.classList.toggle('campo-ok', valido);
            msgEl.classList.toggle('visivel', !valido);
            if (!valido) msgEl.textContent = msg;
            return valido;
        }
    
        emailInput.addEventListener('blur', () =>
            definirCampo(emailInput, erroEmail, validarEmail(emailInput.value), 'Insira um e-mail válido.')
        );
    
        senhaInput.addEventListener('blur', () =>
            definirCampo(senhaInput, erroSenha, senhaInput.value.length >= 6, 'A senha deve ter pelo menos 6 caracteres.')
        );
    
        function handleLogin() {
            const ok =
                definirCampo(emailInput, erroEmail, validarEmail(emailInput.value), 'Insira um e-mail válido.') &
                definirCampo(senhaInput, erroSenha, senhaInput.value.length >= 6, 'A senha deve ter pelo menos 6 caracteres.');
        
            if (!ok) { mostrarToast('Corrija os campos destacados.', 'erro'); return; }
        
            btnLogin.disabled = true;
            btnLogin.textContent = 'Entrando...';
            setTimeout(() => {
                mostrarToast('Login realizado!', 'sucesso');
                btnLogin.disabled = false;
                btnLogin.textContent = 'ACESSAR CONTA';
                setTimeout(() => window.location.href = 'home.html', 1200);
            }, 1500);
        }
    
        btnLogin.addEventListener('click', handleLogin);
        [emailInput, senhaInput].forEach(c => c.addEventListener('keydown', e => e.key === 'Enter' && handleLogin()));
    </script>
</body>
</html>
