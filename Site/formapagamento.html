
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forma de Pagamento</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/símboloSysplus.png">
</head>
<body>

    <header>
        <div class="topo-busca">

            <div class="logo">
                <a href="index.html">
                    <img src="img/logoSysplus.png" class="sysplus">
                </a>
            </div>

            <div class="busca">
                <input type="text" placeholder="Buscar produtos, marcas e muito mais...">
            </div>

            <div id="area-usuario" class="botao-login"></div>

        </div>
    </header>

    <nav>
        <div class="sub-topo carrinho-end">

            <div class="compras">
                <a href="carrinho.html">
                    <img src="img/suascompras.png">
                    Suas compras
                </a>
            </div>

        </div>
    </nav>

    <section class="categorias-carrinho">

        <div class="categoria-circulo">
            <div class="bolinha ativa"></div>
            <span>Carrinho</span>
        </div>

        <div class="linha-categoria"></div>

        <div class="categoria-circulo">
            <div class="bolinha ativa"></div>
            <span>Entrega</span>
        </div>

        <div class="linha-categoria"></div>

        <div class="categoria-circulo">
            <div class="bolinha ativa"></div>
            <span>Pagamento</span>
        </div>

    </section>

    <section class="center-perfil">

        <div class="box-info">

            <h4>Forma de Pagamento</h4>

            <div class="campo-info">
                <label>
                    <input type="radio" name="pagamento" value="cartao-credito" checked>
                    Cartão de Crédito
                </label>
            </div>

            <div class="campo-info">
                <label>
                    <input type="radio" name="pagamento" value="cartao-debito">
                    Cartão de Débito
                </label>
            </div>

            <div class="campo-info">
                <label>
                    <input type="radio" name="pagamento" value="pix">
                    PIX
                </label>
            </div>

            <div class="campo-info">
                <label>
                    <input type="radio" name="pagamento" value="boleto">
                    Boleto Bancário
                </label>
            </div>

            <div class="end">
                <button class="btn-editar" onclick="pagar()">
                    CONFIRMAR PEDIDO
                </button>
            </div>

        </div>

    </section>

    <script>
        const logado = localStorage.getItem('usuario_logado');
        const nome = localStorage.getItem('usuario_nome');
        const area = document.getElementById('area-usuario');

        if (logado === 'true' && nome) {
            const primeiroNome = nome.split(' ')[0];

            area.innerHTML = `
                <a href="perfil.html">
                    <span class="saudacao">Olá, ${primeiroNome}!</span>
                    <img src="img/user.png" alt="perfil">
                </a>
            `;
        } else {
            area.innerHTML = `
                <a href="login.html">
                    <img src="img/user.png" class="icone-perfil" alt="perfil">
                    VISITANTE
                </a>
            `;
        }

        sessionStorage.setItem('forma_pagamento', 'pix')
        sessionStorage.setItem('forma_pagamento', 'boleto')
        sessionStorage.setItem('forma_pagamento', 'cartao-debito')
        sessionStorage.setItem('forma_pagamento', 'cartao-credito')
    </script>

    <script src="js/formaPagamento.js"></script>

</body>
</html>
