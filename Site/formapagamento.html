<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forma de Pagamento</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/símboloSysplus.png">
</head>
<body>

    <header>
        <div class="topo-busca">

            <div class="logo">
                <a href="index.html">
                    <img src="img/logoSysplus.png" class="sysplus">
                </a>
            </div>

            <div class="busca">
                <input type="text" placeholder="Buscar produtos, marcas e muito mais...">
            </div>

            <div id="area-usuario" class="botao-login"></div>

        </div>
    </header>

    <nav>
        <div class="sub-topo carrinho-end">

            <div class="compras">
                <a href="carrinho.html">
                    <img src="img/suascompras.png">
                    Suas compras
                </a>
            </div>

        </div>
    </nav>

    <section class="categorias-carrinho">

        <div class="categoria-circulo">
            <div class="bolinha ativa"></div>
            <span>Carrinho</span>
        </div>

        <div class="linha-categoria"></div>

        <div class="categoria-circulo">
            <div class="bolinha ativa"></div>
            <span>Entrega</span>
        </div>

        <div class="linha-categoria"></div>

        <div class="categoria-circulo">
            <div class="bolinha ativa"></div>
            <span>Pagamento</span>
        </div>

    </section>

    <section class="center-perfil">

        <div class="box-info">

            <h4>Forma de Pagamento</h4>

            <div class="campo-info">
                <label>
                    <input type="radio" name="pagamento" value="cartao" checked>
                    Cartão de Crédito
                </label>
            </div>

            <div class="campo-info">
                <label>Número do Cartão</label>
                <input type="text" id="numero-cartao">
            </div>

            <div class="linha">

                <div class="campo-info">
                    <label>Validade</label>
                    <input type="text" id="validade-cartao" placeholder="MM/AA">
                </div>

                <div class="campo-info">
                    <label>CVV</label>
                    <input type="text" id="cvv-cartao">
                </div>

            </div>

            <div class="campo-info">
                <label>Nome Impresso no Cartão</label>
                <input type="text" id="nome-cartao">
            </div>

            <div class="campo-info">
                <label>
                    <input type="radio" name="pagamento" value="pix">
                    PIX
                </label>
            </div>

            <div class="campo-info">
                <label>
                    <input type="radio" name="pagamento" value="boleto">
                    Boleto Bancário
                </label>
            </div>

            <div class="end">
                <button class="btn-editar" onclick="confirmarPedido()">
                    CONFIRMAR PEDIDO
                </button>
            </div>

        </div>

    </section>

    <script>
        const logado = localStorage.getItem('usuario_logado');
        const nome = localStorage.getItem('usuario_nome');
        const area = document.getElementById('area-usuario');

        if (logado === 'true' && nome) {
            const primeiroNome = nome.split(' ')[0];

            area.innerHTML = `
                <a href="perfil.html">
                    <span class="saudacao">Olá, ${primeiroNome}!</span>
                    <img src="img/user.png" alt="perfil">
                </a>
            `;
        } else {
            area.innerHTML = `
                <a href="login.html">
                    <img src="img/user.png" class="icone-perfil" alt="perfil">
                    VISITANTE
                </a>
            `;
        }
    </script>

    <script>
        function confirmarPedido() {
            // 1. Obtém qual método foi marcado
            const formaPagamento = document.querySelector('input[name="pagamento"]:checked').value;

            // 2. Só valida dados do cartão se a opção 'cartao' estiver ativa
            if (formaPagamento === 'cartao') {
                const numero = document.getElementById('numero-cartao').value.trim();
                const validade = document.getElementById('validade-cartao').value.trim();
                const cvv = document.getElementById('cvv-cartao').value.trim();
                const nomeCartao = document.getElementById('nome-cartao').value.trim();

                if (!numero || !validade || !cvv || !nomeCartao) {
                    alert('Por favor, preencha todos os dados do cartão de crédito.');
                    return; 
                }
            }

            
            alert('Pedido confirmado com sucesso! Obrigado por comprar na Sysplus.');
            
            
            localStorage.removeItem('carrinho');
            sessionStorage.removeItem('endereco');

           
            window.location.href = 'index.html';
        }
    </script>

</body>
</html>
