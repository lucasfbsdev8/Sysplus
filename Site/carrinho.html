<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/símboloSysplus.png">
</head>
<body>
    <header>
        <div class="topo-busca">
            <div class="logo">
                <a href="index.html">
                    <img src="img/logoSysplus.png" class="sysplus">
                </a>
            </div>
            <div class="busca">
                <input type="text" placeholder="Buscar produtos, marcas e muito mais...">
            </div>
            <div id="area-usuario" class="botao-login"></div>
        </div>
    </header>

    <nav>
        <div class="sub-topo carrinho-end">
            <div class="compras">
                <a href="carrinho.html">
                    <img src="img/suascompras.png">
                    Suas compras
                    <span id="badge-carrinho" class="badge-carrinho" style="display:none"></span>
                </a>
            </div>
        </div>
    </nav>

    <section class="categorias-carrinho">
        <div class="categoria-circulo">
            <div class="bolinha ativa"></div>
            <span>Carrinho</span>
        </div>
        <div class="linha-categoria"></div>
        <div class="categoria-circulo">
            <div class="bolinha"></div>
            <span>Entrega</span>
        </div>
        <div class="linha-categoria"></div>
        <div class="categoria-circulo">
            <div class="bolinha"></div>
            <span>Pagamento</span>
        </div>
    </section>

    <section class="area-carrinho">
        <div class="produtos-carrinho">
            <h2>Seu Carrinho</h2>
            <div id="lista-carrinho"></div>
        </div>

        <div class="resumo-carrinho">
            <h2>Resumo</h2>
            <div class="linha-resumo">
                <span>Produtos (<span id="qtd-itens">0</span>)</span>
                <span id="subtotal-resumo">R$ 0</span>
            </div>
            <div class="linha-resumo">
                <span>Frete</span>
                <span>Grátis</span>
            </div>
            <div class="linha-resumo total">
                <span>Total</span>
                <span id="total-resumo">R$ 0</span>
            </div>
            <div>
                <button class="btn-editar" style="width: 100%; margin-top: 15px;" onclick="prosseguirParaEntrega()">
                    CONTINUAR COMPRA
                </button>
            </div>
        </div>
    </section>

    <script src="js/produtos.js"></script>

    <script>
        // 1. Controle da Área de Usuário (Menu Superior)
        const logado = localStorage.getItem('usuario_logado');
        const nome = localStorage.getItem('usuario_nome');
        const area = document.getElementById('area-usuario');

        if (logado === 'true' && nome) {
            const primeiroNome = nome.split(' ')[0];
            area.innerHTML = `
               <a href="perfil.html">
                   <span class="saudacao">Olá, ${primeiroNome}!</span>
                   <img src="img/user.png" alt="perfil">
               </a>
            `;
        } else {
            area.innerHTML = `
               <a href="login.html">
                   <img src="img/user.png" class="icone-perfil" alt="perfil">
                   VISITANTE
               </a>
            `;
        }

        // 2. Lógica para renderizar os itens do carrinho e calcular totais
        function carregarCarrinho() {
            // Pega o carrinho salvo (espera-se uma lista de IDs ou objetos armazenada no localStorage)
            const itensCarrinhoIds = JSON.parse(localStorage.getItem('carrinho')) || [];
            const listaContainer = document.getElementById('lista-carrinho');
            
            if (itensCarrinhoIds.length === 0) {
                listaContainer.innerHTML = '<p style="padding: 20px 0;">Seu carrinho está vazio.</p>';
                atualizarResumo(0, 0);
                return;
            }

            let subtotal = 0;
            let htmlItens = '';

            // Mapeia os IDs salvos no carrinho com a lista de PRODUTOS (vinda de produtos.js)
            itensCarrinhoIds.forEach((idProduto, index) => {
                const produto = PRODUTOS.find(p => p.id === idProduto);
                
                if (produto) {
                    subtotal += produto.preco;
                    htmlItens += `
                        <div class="card-produto-carrinho" style="display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #ddd; padding: 10px 0;">
                            <div style="display: flex; align-items: center; gap: 15px;">
                                <img src="${produto.imagem}" alt="${produto.nome}" style="width: 70px; height: 70px; object-fit: contain;">
                                <div>
                                    <h4 style="margin: 0 0 5px 0;">${produto.nome}</h4>
                                    <p style="margin: 0; color: #2574ff; font-weight: bold;">R$ ${produto.preco.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</p>
                                </div>
                            </div>
                            <button onclick="removerItem(${index})" style="background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">
                                Remover
                            </button>
                        </div>
                    `;
                }
            });

            listaContainer.innerHTML = htmlItens;
            atualizarResumo(itensCarrinhoIds.length, subtotal);
        }

        function atualizarResumo(quantidade, total) {
            document.getElementById('qtd-itens').textContent = quantidade;
            document.getElementById('subtotal-resumo').textContent = `R$ ${total.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            document.getElementById('total-resumo').textContent = `R$ ${total.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            
            // Atualiza o badge do topo se necessário
            const badge = document.getElementById('badge-carrinho');
            if(badge) {
                if (quantidade > 0) {
                    badge.textContent = quantidade;
                    badge.style.display = 'inline-block';
                } else {
                    badge.style.display = 'none';
                }
            }
        }

        function removerItem(indexALevar) {
            let itensCarrinhoIds = JSON.parse(localStorage.getItem('carrinho')) || [];
            // Remove o item pelo índice específico na lista
            itensCarrinhoIds.splice(indexALevar, 1);
            localStorage.setItem('carrinho', JSON.stringify(itensCarrinhoIds));
            carregarCarrinho(); // Recarrega a tela atualizada
        }

        function prosseguirParaEntrega() {
            const itensCarrinhoIds = JSON.parse(localStorage.getItem('carrinho')) || [];
            if (itensCarrinhoIds.length === 0) {
                alert('Adicione pelo menos um produto ao carrinho antes de continuar.');
                return;
            }
            // Redireciona para o próximo passo do checkout
            window.location.href = 'endereco.html';
        }

        // Executa a função ao carregar a página
        window.onload = carregarCarrinho;
    </script>
</body>
</html>
