<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/símboloSysplus.png">
</head>
<body>
    <header>
        <div class="topo-busca">

            <div class="logo">
                <a href="index.html">
                    <img src="img/logoSysplus.png" class="sysplus">
                </a>
            </div>

            <div class="busca">
                <input type="text" placeholder="Buscar produtos, marcas e muito mais...">
            </div>

            <div id="area-usuario" class="botao-login"></div>

        </div>
    </header>

    <nav>
        <div class="sub-topo carrinho-end">

            <div class="compras">
                <a href="carrinho.html">
                    <img src="img/suascompras.png">
                    Suas compras
                    <span id="badge-carrinho" class="badge-carrinho" style="display:none"></span>
                </a>
            </div>

        </div>
    </nav>


    <section class="categorias-carrinho">

        <div class="categoria-circulo">
            <div class="bolinha ativa"></div>
            <span>Carrinho</span>
        </div>

        <div class="linha-categoria"></div>

        <div class="categoria-circulo">
            <div class="bolinha"></div>
            <span>Entrega</span>
        </div>

        <div class="linha-categoria"></div>

        <div class="categoria-circulo">
            <div class="bolinha"></div>
            <span>Pagamento</span>
        </div>

    </section>

    <section class="area-carrinho">

        <div class="produtos-carrinho">

            <h2>Seu Carrinho</h2>
            <div id="lista-carrinho"></div>

        </div>


        <div class="resumo-carrinho">
            <h2>Resumo</h2>

            <div class="linha-resumo">
                <span>Produtos (<span id="qtd-itens">0</span>)</span>
                <span id="subtotal-resumo">R$ 0</span>
            </div>
            <div class="linha-resumo">
                <span>Frete</span>
                <span>Grátis</span>
            </div>
            <div class="linha-resumo total">
                <span>Total</span>
                <span id="total-resumo">R$ 0</span>
            </div>
            <div>
                <button class="finalizar-compra" onclick="irParaEntrega()">
                Finalizar Compra
                </button>
            </div>
        </div>

    </section>

    <div class="toast" id="toast"></div>

    <script>
        const logado = localStorage.getItem('usuario_logado');
        const nome   = localStorage.getItem('usuario_nome');
        const area   = document.getElementById('area-usuario');

        if (logado === 'true' && nome) {
            const primeiroNome = nome.split(' ')[0];

            area.innerHTML = `
                <a href="perfil.html">
                    <span class="saudacao">Olá, ${primeiroNome}!</span>
                    <img src="img/user.png" alt="perfil">
                </a>
            `;
        } else {
            area.innerHTML = `
                <a href="login.html">
                    <img src="img/user.png" class="icone-perfil" alt="perfil">
                    VISITANTE
                </a>
            `;
        }
    </script>

    <script src="js/produtos.js"></script>
    <script src="js/carrinho.js"></script>

    <script>
        function renderizarCarrinho() {
            const carrinho = getCarrinho();
            const lista = document.getElementById('lista-carrinho');
        
            if (carrinho.length === 0) {
                lista.innerHTML = '<p style="text-align:center;padding:40px;color:#888">Carrinho vazio. <a href="index.html">Ver produtos</a></p>';
                document.getElementById('qtd-itens').textContent     = 0;
                document.getElementById('subtotal-resumo').textContent = 'R$ 0';
                document.getElementById('total-resumo').textContent  = 'R$ 0';
                return;
            }
        
            lista.innerHTML = carrinho.map(item => `
                <div class="card-carrinho">
                    <img src="${item.imagem}" class="imagem-produto">
                    <div class="info-produto">
                        <h3>${item.nome}</h3>
                        <p>${item.entrega} • ${item.frete}</p>
                        <div class="quantidade">
                            <button onclick="mudarQtd(${item.id}, -1)">-</button>
                            <span>${item.qtd}</span>
                            <button onclick="mudarQtd(${item.id}, 1)">+</button>
                        </div>
                    </div>
                    <div class="preco-produto">
                        <h3>R$ ${(item.preco * item.qtd).toLocaleString('pt-BR')}</h3>
                        <button class="remover" onclick="remover(${item.id})">Remover</button>
                    </div>
                </div>`).join('');
            
            const total    = carrinho.reduce((s, i) => s + i.preco * i.qtd, 0);
            const qtdTotal = carrinho.reduce((s, i) => s + i.qtd, 0);
            
            document.getElementById('qtd-itens').textContent      = qtdTotal;
            document.getElementById('subtotal-resumo').textContent = 'R$ ' + total.toLocaleString('pt-BR');
            document.getElementById('total-resumo').textContent   = 'R$ ' + total.toLocaleString('pt-BR');
        }
            
        function irParaEntrega() {
            const logado = localStorage.getItem('usuario_logado');
            if (logado !== 'true') {
                mostrarToast('Faça login para continuar.', 'erro');
                setTimeout(() => window.location.href = 'login.html', 1500);
                return;
            }
            if (getCarrinho().length === 0) {
                mostrarToast('Seu carrinho está vazio!', 'erro');
                return;
            }
            window.location.href = 'endereco.html';
        }
        

            
        function irParaEntrega() {
            const logado = localStorage.getItem('usuario_logado');
            if (logado !== 'true') {
                mostrarToast('Faça login para continuar.', 'erro');
                setTimeout(() => window.location.href = 'login.html', 1500);
                return;
            }
            if (getCarrinho().length === 0) {
                mostrarToast('Seu carrinho está vazio!', 'erro');
                return;
            }
            window.location.href = 'endereco.html';
        }
        
        function mudarQtd(id, delta) {
            let c = getCarrinho();
            const idx = c.findIndex(i => i.id === id);
            c[idx].qtd += delta;
            if (c[idx].qtd <= 0) c.splice(idx, 1);
            salvarCarrinho(c);
            renderizarCarrinho();
        }

        function remover(id) {
            salvarCarrinho(getCarrinho().filter(i => i.id !== id));
            renderizarCarrinho();
        }

        renderizarCarrinho();
    </script>

</body>
</html>
