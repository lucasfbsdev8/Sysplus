<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/símboloSysplus.png">
</head>
<body>
    <header>
        <div class="topo-busca">
            <div class="logo">
                <a href="index.html">
                    <img src="img/logoSysplus.png" class="sysplus">
                </a>
            </div>
            <div class="busca">
                <input type="text" placeholder="Buscar produtos, marcas e muito mais...">
            </div>
            <div id="area-usuario" class="botao-login"></div>
        </div>
    </header>

    <nav>
        <div class="sub-topo carrinho-end">
            <div class="compras">
                <a href="carrinho.html">
                    <img src="img/suascompras.png">
                    Suas compras
                    <span id="badge-carrinho" class="badge-carrinho" style="display:none"></span>
                </a>
            </div>
        </div>
    </nav>

    <section class="categorias-carrinho">
        <div class="categoria-circulo">
            <div class="bolinha ativa"></div>
            <span>Carrinho</span>
        </div>
        <div class="linha-categoria"></div>
        <div class="categoria-circulo">
            <div class="bolinha"></div>
            <span>Entrega</span>
        </div>
        <div class="linha-categoria"></div>
        <div class="categoria-circulo">
            <div class="bolinha"></div>
            <span>Pagamento</span>
        </div>
    </section>

    <section class="area-carrinho">
        <div class="produtos-carrinho">
            <h2>Seu Carrinho</h2>
            <div id="lista-carrinho"></div>
        </div>

        <div class="resumo-carrinho">
            <h2>Resumo</h2>
            <div class="linha-resumo">
                <span>Produtos (<span id="qtd-itens">0</span>)</span>
                <span id="subtotal-resumo">R$ 0</span>
            </div>
            <div class="linha-resumo">
                <span>Frete</span>
                <span>Grátis</span>
            </div>
            <div class="linha-resumo total">
                <span>Total</span>
                <span id="total-resumo">R$ 0</span>
            </div>
            <div>
                <button class="finalizar-compra" onclick="prosseguirParaEntrega()">
                    CONTINUAR COMPRA
                </button>
            </div>
        </div>
    </section>

    <div id="toast" class="toast"></div>

    <script src="js/produtos.js"></script>
    <script src="js/carrinho.js"></script>

    <script>
        // 1. Inicialização do topo da página (Identificação do Utilizador)
        const logado = localStorage.getItem('usuario_logado');
        const nome = localStorage.getItem('usuario_nome');
        const area = document.getElementById('area-usuario');

        if (logado === 'true' && nome) {
            const primeiroNome = nome.split(' ')[0];
            area.innerHTML = `
               <a href="perfil.html">
                   <span class="saudacao">Olá, ${primeiroNome}!</span>
                   <img src="img/user.png" alt="perfil">
               </a>
            `;
        } else {
            area.innerHTML = `
               <a href="login.html">
                   <img src="img/user.png" class="icone-perfil" alt="perfil">
                   VISITANTE
               </a>
            `;
        }

        // 2. Renderização dos produtos baseada nas funções nativas do seu carrinho.js
        function renderizarCarrinhoDoUtilizador() {
            // getCarrinho() vem diretamente do seu ficheiro js/carrinho.js
            const carrinho = getCarrinho(); 
            const listaContainer = document.getElementById('lista-carrinho');
            
            if (carrinho.length === 0) {
                listaContainer.innerHTML = '<p style="padding: 20px 0; color: #777;">O seu carrinho está vazio.</p>';
                atualizarPainelResumo(0, 0);
                return;
            }

            let valorTotalGeral = 0;
            let totalUnidades = 0;
            let htmlFinal = '';

            carrinho.forEach((item) => {
                const subtotalItem = item.preco * item.qtd;
                valorTotalGeral += subtotalItem;
                totalUnidades += item.qtd;

                // Monta a estrutura usando rigidamente as classes do seu style.css
                htmlFinal += `
                    <div class="card-carrinho">
                        <img src="${item.imagem}" alt="${item.nome}">
                        <div class="info-produto">
                            <h3>${item.nome}</h3>
                            <div class="quantidade">
                                <span>Quantidade: ${item.qtd}</span>
                            </div>
                            <button class="remover" onclick="removerProdutoCarrinho(${item.id})">
                                Remover
                            </button>
                        </div>
                        <div class="preco-produto">
                            <p style="color: #1c86a3; font-weight: bold; margin: 0; font-size: 18px;">
                                R$ ${subtotalItem.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                            </p>
                        </div>
                    </div>
                `;
            });

            listaContainer.innerHTML = htmlFinal;
            atualizarPainelResumo(totalUnidades, valorTotalGeral);
        }

        function atualizarPainelResumo(quantidade, total) {
            document.getElementById('qtd-itens').textContent = quantidade;
            document.getElementById('subtotal-resumo').textContent = `R$ ${total.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            document.getElementById('total-resumo').textContent = `R$ ${total.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            
            // Invoca a função de atualizar a bolinha do header do seu próprio script
            if (typeof atualizarBadge === "function") {
                atualizarBadge();
            }
        }

        // Função para remover o produto por completo e sincronizar com o seu script
        function removerProdutoCarrinho(idProduto) {
            let carrinho = getCarrinho();
            // Remove o item correspondente ao ID clicado
            carrinho = carrinho.filter(item => item.id !== idProduto);
            salvarCarrinho(carrinho); // Atualiza o localStorage através da sua função
            
            // Executa a sua função de feedback visual nativa
            if (typeof mostrarToast === "function") {
                mostrarToast('Produto removido com sucesso!', 'sucesso');
            }
            
            renderizarCarrinhoDoUtilizador(); // Atualiza o ecrã instantaneamente
        }

        // Função para passar à próxima etapa (Endereço de Entrega)
        function prosseguirParaEntrega() {
            const carrinho = getCarrinho();
            if (carrinho.length === 0) {
                alert('O seu carrinho está vazio! Adicione produtos na página inicial.');
                return;
            }
            window.location.href = 'endereco.html';
        }

        // Carrega a lista de produtos assim que o documento HTML estiver pronto
        window.onload = renderizarCarrinhoDoUtilizador;
    </script>
</body>
</html>
